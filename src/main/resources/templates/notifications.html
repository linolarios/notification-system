<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notification System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="/css/notifications.css">
</head>
<body>
<main class="page">
    <section class="hero">
        <div>
            <h1>Notification System</h1>
            <p>Submit a message by category and process notifications asynchronously.</p>
        </div>
        <button id="refreshLogsButton" type="button" class="secondary-button">
            Refresh logs
        </button>
    </section>

    <section class="card">
        <h2>Submit notification</h2>

        <form id="notificationForm" class="form">
            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category" required>
                    <option value="">Loading categories...</option>
                </select>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea
                        id="message"
                        name="message"
                        rows="5"
                        maxlength="1000"
                        placeholder="Write your notification message..."
                        required></textarea>
                <div class="helper">
                    <span id="messageCounter">0</span>/1000 characters
                </div>
            </div>

            <div class="actions">
                <button id="submitButton" type="submit">
                    Submit notification
                </button>
            </div>
        </form>

        <div id="submissionResult" class="alert hidden"></div>
    </section>

    <section class="card">
        <div class="section-header">
            <div>
                <h2>Notification log history</h2>
                <p>Newest records appear first.</p>
            </div>
            <div id="logSummary" class="summary"></div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                <tr>
                    <th>Created At</th>
                    <th>Correlation ID</th>
                    <th>Category</th>
                    <th>Channel</th>
                    <th>Recipient</th>
                    <th>Status</th>
                    <th>Error</th>
                </tr>
                </thead>
                <tbody id="logsTableBody">
                <tr>
                    <td colspan="7" class="empty">Loading logs...</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<script src="/js/notifications.js"></script>
</body>
</html>
