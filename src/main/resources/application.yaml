spring:
  application:
    name: notification

  datasource:
    url: jdbc:postgresql://localhost:5432/notification
    username: notification
    password: notification
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=10m

notification:
  queue:
    capacity: 1000
    processing-mode: database # Supported values: database or memory. Database mode processes persisted notification jobs

  worker:
    enabled: true
    fixed-delay-ms: 1000
    batch-size: 20
    stale-timeout-minutes: 5
    recovery-fixed-delay-ms: 30000
    recovery-batch-size: 20
    retry-fixed-delay-ms: 60000
    retry-batch-size: 20
    retry-max-attempts: 3

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] correlationId=%X{correlationId:-} %logger{36} - %msg%n"
  level:
    com.challenge.notification: INFO
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
    org.springframework.boot.autoconfigure.flyway: INFO
